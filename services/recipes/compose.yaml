name: platform-recipes

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  recipes:
    image: ghcr.io/hsiii/recipes:${RECIPES_IMAGE_TAG:-main}
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    logging: *default-logging
    labels:
      dev.hsichen.platform.managed: "true"
    env_file:
      - /srv/platform/secrets/recipe.env
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - const response = await fetch('http://127.0.0.1:3101/api/health'); if (!response.ok) process.exit(1);
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - recipes-uploads:/app/uploads
    networks:
      frontend:
        aliases:
          - recipes

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-platform_edge}

volumes:
  recipes-uploads:
    external: true
    name: recipe-site_uploads
