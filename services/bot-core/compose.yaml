name: platform-bot-core

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  bot-core:
    image: ghcr.io/hsiii/minisago:${BOT_CORE_IMAGE_TAG:-main}
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    logging: *default-logging
    labels:
      dev.hsichen.platform.managed: "true"
    env_file:
      - /srv/platform/secrets/bot-core.env
    environment:
      GAMER_FORUM_STATE_FILE: /app/state/gamer-forum-state.json
      X_POST_STATE_FILE: /app/state/x-post-state.json
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - bot-core-state:/app/state
    networks:
      frontend:
        aliases:
          - bot-core

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-platform_edge}

volumes:
  bot-core-state:
    external: true
    name: platform_bot-core-state
