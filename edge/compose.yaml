name: sago-cloud-edge

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  edge:
    image: caddy:2-alpine
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    logging: *default-logging
    labels:
      dev.hsichen.sago-cloud.managed: "true"
    env_file:
      - /srv/sago-cloud/secrets/proxy.env
    volumes:
      - ./:/etc/caddy:ro
      - /srv/pr-media:/srv/pr-media:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      frontend:
        aliases:
          - edge

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-sago_cloud_edge}

volumes:
  caddy-data:
    external: true
    name: sago_cloud_caddy-data
  caddy-config:
    external: true
    name: sago_cloud_caddy-config
