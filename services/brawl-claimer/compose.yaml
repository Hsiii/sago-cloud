name: platform-brawl-claimer

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  brawl-claimer:
    image: ghcr.io/hsiii/brawl-claim:${BRAWL_CLAIMER_IMAGE_TAG:-sha-041fef9}
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 768m
    shm_size: 512mb
    logging: *default-logging
    labels:
      dev.hsichen.platform.managed: "true"
    env_file:
      - /srv/platform/secrets/brawl-claimer.env
    environment:
      BRAWL_CLAIM_ENABLED: "false"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - const response = await fetch('http://127.0.0.1:3100/brawlstars/api/health'); if (!response.ok) process.exit(1);
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 30s
    volumes:
      - brawl-claimer-state:/app/state
    networks:
      edge:
        aliases:
          - brawl-claimer

networks:
  edge:
    external: true
    name: platform_edge

volumes:
  brawl-claimer-state:
    external: true
    name: brawl-stars-claimer_state
