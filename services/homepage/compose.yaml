name: sago-cloud-homepage

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  homepage-migrate:
    image: ghcr.io/hsiii/homepage:${HOMEPAGE_IMAGE_TAG:-main}
    restart: "no"
    cpus: 0.25
    mem_limit: 256m
    logging: *default-logging
    labels:
      dev.hsichen.sago-cloud.managed: "true"
    env_file:
      - /srv/sago-cloud/secrets/homepage.env
    command:
      - node
      - scripts/migrate.ts
    networks:
      - data

  homepage:
    image: ghcr.io/hsiii/homepage:${HOMEPAGE_IMAGE_TAG:-main}
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    logging: *default-logging
    labels:
      dev.hsichen.sago-cloud.managed: "true"
    env_file:
      - /srv/sago-cloud/secrets/homepage.env
    depends_on:
      homepage-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3102/api/health >/dev/null || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      frontend:
        aliases:
          - homepage
      data:

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-sago_cloud_edge}
  data:
    external: true
    name: ${DATA_NETWORK_NAME:-sago_cloud_data}
