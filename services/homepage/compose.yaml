name: platform-homepage

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  homepage:
    image: node:24-alpine
    command:
      - node
      - server.js
    working_dir: /app
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    logging: *default-logging
    labels:
      dev.hsichen.platform.managed: "true"
    env_file:
      - /srv/platform/secrets/homepage.env
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "3102"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3102/api/health >/dev/null || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - /srv/platform/artifacts/homepage:/app:ro
    networks:
      frontend:
        aliases:
          - homepage

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-platform_edge}
