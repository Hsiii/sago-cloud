name: oracle

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    logging: *default-logging
    env_file:
      - ../secrets/proxy.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/videos:/srv/videos:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - shared

  wm31bot:
    build:
      context: ../apps/wm31
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    logging: *default-logging
    env_file:
      - ../secrets/wm31.env
    environment:
      GAMER_FORUM_STATE_FILE: /app/state/gamer-forum-state.json
      X_POST_STATE_FILE: /app/state/x-post-state.json
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - wm31bot-state:/app/state
    networks:
      - shared

  brawl-stars-claimer:
    build:
      context: ../apps/morning
      args:
        INSTALL_PLAYWRIGHT_BROWSERS: "true"
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 768m
    shm_size: 512mb
    logging: *default-logging
    env_file:
      - ../secrets/brawl-stars-claimer.env
    environment:
      BRAWL_STARS_CLAIMER_ENABLED: "false"
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://127.0.0.1:3100/api/health'); if (!response.ok) process.exit(1);"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - brawl-stars-claimer-state:/app/state
    networks:
      - shared

  recipe-site:
    build:
      context: ../apps/recipe
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    logging: *default-logging
    env_file:
      - ../secrets/recipe.env
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://127.0.0.1:3101/api/health'); if (!response.ok) process.exit(1);"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - recipe-site-uploads:/app/uploads
    networks:
      - shared

  homepage:
    image: node:24-alpine
    command: ["node", "server.js"]
    working_dir: /app
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    logging: *default-logging
    env_file:
      - ../secrets/homepage.env
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "3102"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3102/api/health >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - /home/ubuntu/bots/artifacts/homepage:/app:ro
    networks:
      - shared

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    shm_size: 128mb
    logging: *default-logging
    env_file:
      - ../secrets/postgres.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - shared

networks:
  shared:
    external: true
    name: bots_shared

volumes:
  caddy-data:
    external: true
    name: proxy_caddy-data
  caddy-config:
    external: true
    name: proxy_caddy-config
  wm31bot-state:
    external: true
    name: wm31bot_wm31bot-state
  brawl-stars-claimer-state:
    external: true
    name: morning_morning-dashboard-state
  recipe-site-uploads:
    external: true
    name: recipe_recipe-site-uploads
  postgres-data:
    external: true
    name: oracle_postgres-data
