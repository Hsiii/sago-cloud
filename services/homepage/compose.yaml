name: sago-cloud-homepage

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  homepage:
    image: ghcr.io/hsiii/homepage:${HOMEPAGE_IMAGE_TAG:-main}
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    logging: *default-logging
    labels:
      dev.hsichen.sago-cloud.managed: "true"
    env_file:
      - /srv/sago-cloud/secrets/homepage.env
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3102/api/health >/dev/null || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      frontend:
        aliases:
          - homepage

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-sago_cloud_edge}
