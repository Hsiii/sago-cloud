name: sago-cloud-minisago-worker

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-worker: &worker
  image: ghcr.io/hsiii/minisago-worker:${MINISAGO_WORKER_IMAGE_TAG:-main}
  restart: unless-stopped
  init: true
  cpus: 1.25
  mem_limit: 2g
  logging: *default-logging
  labels:
    dev.hsichen.sago-cloud.managed: "true"
  networks:
    - frontend

services:
  worker-read:
    <<: *worker
    env_file:
      - /srv/sago-cloud/secrets/minisago-worker-read.env
    environment:
      MINISAGO_WORKER_ID: oracle-read
      MINISAGO_WORKER_CAPABILITIES: chat,dev-read
    volumes:
      - minisago-codex:/home/bun/.codex
      - minisago-github:/home/bun/.config/gh
      - minisago-state-read:/var/lib/minisago
      - minisago-workspace-read:/workspace

  worker-write:
    <<: *worker
    env_file:
      - /srv/sago-cloud/secrets/minisago-worker-write.env
    environment:
      MINISAGO_WORKER_ID: oracle-write
      MINISAGO_WORKER_CAPABILITIES: dev-write
      MINISAGO_MAX_CONCURRENT_JOBS: 1
    volumes:
      - minisago-codex:/home/bun/.codex
      - minisago-github:/home/bun/.config/gh
      - minisago-state-write:/var/lib/minisago
      - minisago-workspace-write:/workspace

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-sago_cloud_edge}

volumes:
  minisago-codex:
    external: true
    name: sago_cloud_minisago-codex
  minisago-github:
    external: true
    name: sago_cloud_minisago-github
  minisago-state-read:
    external: true
    name: sago_cloud_minisago-state-read
  minisago-state-write:
    external: true
    name: sago_cloud_minisago-state-write
  minisago-workspace-read:
    external: true
    name: sago_cloud_minisago-workspace-read
  minisago-workspace-write:
    external: true
    name: sago_cloud_minisago-workspace-write
