name: sago-cloud-pr-media-api

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: ../..
      dockerfile: services/pr-media-api/Dockerfile
    image: sago-cloud-pr-media-api:local
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    cpus: 0.5
    mem_limit: 512m
    logging: *default-logging
    labels:
      dev.hsichen.sago-cloud.managed: "true"
    env_file:
      - /srv/sago-cloud/secrets/pr-media-api.env
    environment:
      PR_MEDIA_TOKEN_DIR: /run/secrets/pr-media-tokens
    volumes:
      - /srv/pr-media:/srv/pr-media
      - /srv/sago-cloud/secrets/pr-media-tokens:/run/secrets/pr-media-tokens:ro
    tmpfs:
      - /tmp:size=256m,mode=1777
    networks:
      frontend:
        aliases:
          - pr-media-api
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - process.exit((await fetch("http://127.0.0.1:3000/health")).ok?0:1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-sago_cloud_edge}
