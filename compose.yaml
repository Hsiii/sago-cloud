name: oracle

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    env_file:
      - ../secrets/proxy.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/videos:/srv/videos:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - shared

  wm31bot:
    build:
      context: ../apps/wm31
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    env_file:
      - ../secrets/wm31.env
    environment:
      GAMER_FORUM_STATE_FILE: /app/state/gamer-forum-state.json
    volumes:
      - wm31bot-state:/app/state
    networks:
      - shared

  morning-dashboard:
    build:
      context: ../apps/morning
      args:
        INSTALL_PLAYWRIGHT_BROWSERS: "true"
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 768m
    shm_size: 512mb
    env_file:
      - ../secrets/morning.env
    environment:
      MORNING_CAPTURE_ENABLED: "false"
    volumes:
      - morning-dashboard-state:/app/state
    networks:
      - shared

  recipe-site:
    build:
      context: ../apps/recipe
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    env_file:
      - ../secrets/recipe.env
    volumes:
      - recipe-site-uploads:/app/uploads
    networks:
      - shared

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    shm_size: 128mb
    env_file:
      - ../secrets/postgres.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - shared

networks:
  shared:
    external: true
    name: bots_shared

volumes:
  caddy-data:
    external: true
    name: proxy_caddy-data
  caddy-config:
    external: true
    name: proxy_caddy-config
  wm31bot-state:
    external: true
    name: wm31bot_wm31bot-state
  morning-dashboard-state:
    external: true
    name: morning_morning-dashboard-state
  recipe-site-uploads:
    external: true
    name: recipe_recipe-site-uploads
  postgres-data:
    external: true
    name: oracle_postgres-data
