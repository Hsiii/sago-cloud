name: platform-obi

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  obi:
    image: couchdb:3.5.2.1
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    logging: *default-logging
    labels:
      dev.hsichen.platform.managed: "true"
    env_file:
      - /srv/platform/secrets/obi.env
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS --user "$${COUCHDB_USER}:$${COUCHDB_PASSWORD}" http://127.0.0.1:5984/_up >/dev/null
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - obi-data:/opt/couchdb/data
      - obi-config:/opt/couchdb/etc/local.d
    networks:
      frontend:
        aliases:
          - obi

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-platform_edge}

volumes:
  obi-data:
    external: true
    name: platform_obi-data
  obi-config:
    external: true
    name: platform_obi-config
