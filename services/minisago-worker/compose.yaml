name: sago-cloud-minisago-worker

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-worker: &worker
  image: ghcr.io/hsiii/minisago-worker:${MINISAGO_WORKER_IMAGE_TAG:-main}
  restart: unless-stopped
  init: true
  cpus: 1.25
  mem_limit: 8g
  logging: *default-logging
  labels:
    dev.hsichen.sago-cloud.managed: "true"
  networks:
    - frontend

services:
  worker:
    <<: *worker
    env_file:
      - /srv/sago-cloud/secrets/minisago-worker.env
    environment:
      MINISAGO_WORKER_ID: oracle
      MINISAGO_WORKER_CAPABILITIES: chat,dev
    volumes:
      - minisago-codex:/home/bun/.codex
      - minisago-github:/home/bun/.config/gh
      - minisago-state:/var/lib/minisago
      - minisago-workspace:/workspace
      - /srv/pr-media:/srv/pr-media
      - /srv/sago-cloud/operations/scripts/pr-media-upload:/usr/local/bin/pr-media-upload:ro
      - /srv/sago-cloud/operations/scripts/pr-media-prune:/usr/local/bin/pr-media-prune:ro

networks:
  frontend:
    external: true
    name: ${EDGE_NETWORK_NAME:-sago_cloud_edge}

volumes:
  minisago-codex:
    external: true
    name: sago_cloud_minisago-codex
  minisago-github:
    external: true
    name: sago_cloud_minisago-github
  minisago-state:
    external: true
    name: sago_cloud_minisago-state
  minisago-workspace:
    external: true
    name: sago_cloud_minisago-workspace
