name: sago-cloud-postgres

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    shm_size: 128mb
    logging: *default-logging
    labels:
      dev.hsichen.sago-cloud.managed: "true"
    env_file:
      - /srv/sago-cloud/secrets/postgres.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      data:
        aliases:
          - postgres

networks:
  data:
    external: true
    name: ${DATA_NETWORK_NAME:-sago_cloud_data}

volumes:
  postgres-data:
    external: true
    name: sago_cloud_postgres-data
